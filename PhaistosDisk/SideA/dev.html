const ctx = document.getElementById("c").getContext("2d");

const img = new Image();
img.src = "data:image/jpeg;base64," + DATA.bg;
img.onload = draw;

let players = [
  {track:"T01", color:"yellow"},
  {track:"T01", color:"lime"}
];
let current = 0;

function draw() {
  ctx.clearRect(0,0,900,900);
  ctx.drawImage(img,0,0,900,900);

  players.forEach(p=>{
    let c = DATA.trackCenters[p.track];
    ctx.beginPath();
    ctx.arc(c.x, c.y, 10, 0, Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.fill();
  });
}

function roll(){
  let d1 = 1 + Math.floor(Math.random()*6);
  let d2 = 1 + Math.floor(Math.random()*6);
  let sum = d1 + d2;

  let p = players[current];
  let idx = DATA.trackLabels.indexOf(p.track);
  let newIdx = idx + sum;

  let old = p.track;

  if(newIdx >= DATA.trackLabels.length) {
    log(`P${current+1} ${d1}+${d2}=${sum} overshoot`);
  } else {
    p.track = DATA.trackLabels[newIdx];

    if(p.track=="T19") {
      log(`P${current+1} ${d1}+${d2}=${sum} ${old}→T19 WIN`);
    } else if(p.track=="T18") {
      log(`P${current+1} ${d1}+${d2}=${sum} ${old}→T18 FAIL`);
    } else {
      log(`P${current+1} ${d1}+${d2}=${sum} ${old}→${p.track}`);
    }
  }

  document.getElementById("roll").innerText = `Rolled ${d1} + ${d2} = ${sum}`;

  current = (current+1)%players.length;
  draw();
}

function log(s){
  let el = document.getElementById("log");
  el.innerHTML = s + "<br>" + el.innerHTML;
}

document.body.onclick = roll;
</script>
