const ctx = document.getElementById("c").getContext("2d");

const img = new Image();
img.src = "data:image/jpeg;base64," + DATA.bg;
img.onload = ()=> draw();

let p={track:"T01"};

function draw() {
 ctx.drawImage(img,0,0,900,900);
 let c = DATA.trackCenters[p.track];
 ctx.beginPath();
 ctx.arc(c.x, c.y, 12, 0, Math.PI*2);
 ctx.fillStyle="yellow";
 ctx.fill();
}

function roll(){
 let d1=1+Math.random()*6|0;
 let d2=1+Math.random()*6|0;
 let sum=d1+d2;

 let idx=DATA.trackLabels.indexOf(p.track)+sum;
 if(idx>=DATA.trackLabels.length){
  log(`${d1}+${d2}=${sum} overshoot`);
  return;
 }

 let old=p.track;
 let target=DATA.trackLabels[idx];

 p.track=target;
 draw();

 if(target=="T19") log(`${d1}+${d2}=${sum} WIN`);
 else if(target=="T18") log(`${d1}+${d2}=${sum} FAIL`);
 else log(`${d1}+${d2}=${sum} ${old}→${target}`);
}

function log(s) {
 document.getElementById("log").innerHTML = s+"<br>"+document.getElementById("log").innerHTML;
}

document.body.onclick=roll;
